<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Threat Scanner SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root{
  --bg:#020617;--panel:#0f172a;--panel2:#111827;--card:#1e293b;--muted:#94a3b8;--text:#f8fafc;
  --border:#334155;--brand:#38bdf8;--brand2:#0ea5e9;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--critical:#dc2626;
}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#1e3a8a33,transparent 35%),var(--bg);color:var(--text)}
a{color:var(--brand);text-decoration:none;word-break:break-word} hr{border:0;border-top:1px solid var(--border);margin:22px 0}
.app{max-width:1180px;margin:auto;padding:22px}.hero{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
.logo h1{margin:0;font-size:34px}.logo p{margin:8px 0 0;color:var(--muted)}.badge{display:inline-flex;align-items:center;gap:8px;background:#082f49;border:1px solid #075985;padding:10px 14px;border-radius:999px;color:#bae6fd;font-weight:bold}
.grid{display:grid;grid-template-columns:380px 1fr;gap:18px}.panel{background:linear-gradient(180deg,#0f172a,#111827);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 18px 45px #00000040}.panel h2,.panel h3{margin-top:0}
.tabs{display:flex;gap:8px;margin-bottom:14px}.tab{flex:1;background:#020617;border:1px solid var(--border);color:var(--text);padding:11px;border-radius:12px;cursor:pointer}.tab.active{background:var(--brand);color:#082f49;border-color:var(--brand);font-weight:bold}
.form-section{display:none}.form-section.active{display:block}.field{margin:10px 0}.field label{display:block;color:#cbd5e1;margin-bottom:6px;font-size:14px}input,select{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);outline:none;background:#020617;color:var(--text);font-size:15px}input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px #38bdf833}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn{border:0;border-radius:12px;padding:12px 14px;font-weight:bold;cursor:pointer;background:var(--brand);color:#082f49;transition:.2s}.btn:hover{transform:translateY(-1px);filter:brightness(1.08)}.btn.secondary{background:#334155;color:#e2e8f0}.btn.danger{background:var(--red);color:#fff}.btn.green{background:var(--green);color:#052e16}.btn.full{grid-column:1/-1}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.statusline{margin-top:14px;padding:12px;border-radius:12px;background:#020617;border:1px solid var(--border);color:#cbd5e1}.mini{font-size:13px;color:var(--muted);line-height:1.6}.out{min-height:300px}.empty{height:100%;min-height:320px;border:1px dashed var(--border);border-radius:18px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:20px;background:#02061766}
.card{background:var(--card);padding:18px;margin-top:15px;border-radius:16px;border:1px solid var(--border);border-left:6px solid var(--brand)}.LOW{border-left-color:var(--green)}.MEDIUM{border-left-color:var(--yellow)}.HIGH{border-left-color:var(--red)}.CRITICAL{border-left-color:var(--critical)}.UNKNOWN{border-left-color:var(--muted)}.INFO{border-left-color:var(--brand)}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:12px;margin:15px 0}.summary-box{background:#020617;border:1px solid var(--border);padding:15px;border-radius:14px;text-align:center}.summary-box h3{margin:0;font-size:13px;color:#cbd5e1}.summary-box p{font-size:24px;font-weight:bold;margin:8px 0 0}.finding,.cve,.nikto{background:#020617;padding:14px;margin:10px 0;border-radius:12px;border:1px solid var(--border);border-left:4px solid var(--brand);overflow-wrap:anywhere}.screenshot-img{max-width:100%;border-radius:14px;margin-top:12px;border:2px solid var(--border)}
.progress-wrap{background:#020617;border:1px solid var(--border);border-radius:999px;overflow:hidden;height:25px;margin:15px 0}.progress-bar{background:linear-gradient(90deg,var(--brand),#22c55e);height:100%;width:0%;text-align:center;color:#082f49;font-weight:bold;transition:width .35s ease;line-height:23px}.queue-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;background:#020617;padding:12px;border-radius:14px;border:1px solid var(--border);margin-top:12px}.queue-info p{margin:0;color:#cbd5e1}.section-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#020617;border:1px solid var(--border);color:#cbd5e1;font-size:12px}.history-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#020617;border:1px solid var(--border);border-radius:12px;padding:12px;margin:10px 0}
@media(max-width:900px){.grid{grid-template-columns:1fr}.hero{display:block}.badge{margin-top:12px}.actions{grid-template-columns:1fr}.app{padding:12px}.logo h1{font-size:27px}.summary-grid{grid-template-columns:1fr 1fr}}@media(max-width:430px){.summary-grid{grid-template-columns:1fr}.tabs{flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="logo"><h1>🛡️ Threat Scanner</h1><p>Professional web security scan dashboard</p></div>
    <div class="badge" id="loginBadge">🔐 Not logged in</div>
  </header>

  <main class="grid">
    <aside class="panel">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <section id="loginBox" class="form-section active">
        <h2>Login</h2>
        <div class="field"><label>Username</label><input id="user" placeholder="username" autocomplete="username"></div>
        <div class="field"><label>Password</label><input id="pass" type="password" placeholder="password" autocomplete="current-password"></div>
        <button class="btn full" onclick="login()">Login</button>
      </section>

      <section id="registerBox" class="form-section">
        <h2>Create Account</h2>
        <div class="field"><label>Username</label><input id="r_user" placeholder="username" autocomplete="username"></div>
        <div class="field"><label>Password</label><input id="r_pass" type="password" placeholder="password" autocomplete="new-password"></div>
        <button class="btn green full" onclick="register()">Register</button>
      </section>

      <hr>
      <h2>Scan Target</h2>
      <div class="field"><label>Target domain or URL</label><input id="t" placeholder="example.com or https://example.com"></div>
      <div class="field"><label>Scan profile</label><select id="scan_profile"><option value="quick">⚡ Quick Scan</option><option value="full" selected>🛡️ Full Scan</option><option value="deep">🔥 Deep Scan</option></select></div>
      <div class="actions">
        <button class="btn full" onclick="scan()">🚀 Start Scan</button>
        <button class="btn secondary" onclick="captureScreenshot()">📸 Screenshot</button>
        <button class="btn secondary" onclick="loadHistory()">📜 History</button>
        <button class="btn secondary" onclick="downloadReport()">JSON</button>
        <button class="btn secondary" onclick="downloadPDF()">PDF</button>
        <button class="btn danger" onclick="logout()">Logout</button>
      </div>
      <div class="statusline" id="statusBox">Ready. Login first, then run a scan.</div>
      <p class="mini">Backend API: <span id="apiText"></span></p>
    </aside>

    <section class="panel out" id="out">
      <div class="empty"><div><h2>🔎 No scan yet</h2><p>Start a scan to see SSL, DNS, WAF, CVE, ports, headers, subdomains, and findings.</p></div></div>
    </section>
  </main>
</div>

<script>
let API = "https://threat-scanner-saas-1.onrender.com";
let lastReport = null;
let progressTimer = null;
let currentJobId = null;

document.getElementById("apiText").innerText = API;
updateAuthUI();

function $(id){ return document.getElementById(id); }
function setStatus(msg){ $("statusBox").innerHTML = msg; }
function esc(value){ return String(value ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])); }
function val(id){ return $(id).value.trim(); }

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  if(tab === 'login'){
    document.querySelectorAll('.tab')[0].classList.add('active'); $('loginBox').classList.add('active');
  }else{
    document.querySelectorAll('.tab')[1].classList.add('active'); $('registerBox').classList.add('active');
  }
}

function updateAuthUI(){
  const token = localStorage.getItem("token");
  $("loginBadge").innerText = token ? "✅ Logged in" : "🔐 Not logged in";
}

async function register(){
  const username = val("r_user"), password = val("r_pass");
  if(!username || !password){ setStatus("❌ Enter username and password"); return; }
  try{
    const res = await fetch(API + "/register", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const data = await res.json().catch(()=>({}));
    setStatus(res.ok ? "✅ Account created. You can login now." : "❌ " + esc(data.detail || "Register failed"));
    if(res.ok) switchTab('login');
  }catch(e){ setStatus("❌ Cannot connect to backend"); }
}

async function login(){
  const username = val("user"), password = val("pass");
  if(!username || !password){ setStatus("❌ Enter username and password"); return; }
  try{
    const res = await fetch(API + "/login", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const data = await res.json().catch(()=>({}));
    if(data.access_token){ localStorage.setItem("token", data.access_token); setStatus("✅ Logged in successfully"); updateAuthUI(); }
    else setStatus("❌ " + esc(data.detail || "Login failed"));
  }catch(e){ setStatus("❌ Cannot connect to backend"); }
}

function requireToken(){
  const token = localStorage.getItem("token");
  if(!token){ setStatus("❌ لازم تسجل دخول أولاً"); return null; }
  return token;
}

async function scan(){
  const target = val("t"), profile = val("scan_profile"), token = requireToken();
  if(!token) return;
  if(!target){ setStatus("❌ اكتب الموقع أولاً"); return; }
  if(progressTimer){ clearInterval(progressTimer); progressTimer = null; }
  currentJobId = null; lastReport = null;
  $("out").innerHTML = `<div class="card INFO"><h2>⏳ Scan Starting...</h2><p><b>Target:</b> ${esc(target)}</p><p><b>Profile:</b> ${esc(profile)}</p><div class="progress-wrap"><div id="progressBar" class="progress-bar">0%</div></div><div class="queue-info"><p><b>Status:</b><br><span id="queueStatus">starting</span></p><p><b>Queue Position:</b><br><span id="queuePosition">-</span></p><p><b>Queue Size:</b><br><span id="queueSize">-</span></p><p><b>Step:</b><br><span id="progressStep">Preparing...</span></p></div><button class="btn danger" style="margin-top:14px" onclick="cancelScan()">Cancel Scan</button></div>`;
  try{
    const res = await fetch(API + "/scan-async", {method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer " + token},body:JSON.stringify({target, profile})});
    const data = await res.json().catch(()=>({}));
    if(!res.ok){ showError(data.detail || "Scan failed"); return; }
    currentJobId = data.job_id; updateQueueUI(data); pollScanStatus(data.job_id); setStatus("🔄 Scan running...");
  }catch(e){ showError("Cannot connect to backend"); }
}

function updateQueueUI(job){
  const progress = job.progress || 0;
  if($("progressBar")){ $("progressBar").style.width = progress + "%"; $("progressBar").innerText = progress + "%"; }
  if($("progressStep")) $("progressStep").innerText = job.step || job.message || "Scanning...";
  if($("queueStatus")) $("queueStatus").innerText = job.status || "unknown";
  if($("queuePosition")) $("queuePosition").innerText = job.queue_position || "-";
  if($("queueSize")) $("queueSize").innerText = job.queue_size ?? "-";
}

async function cancelScan(){
  const token = requireToken(); if(!token) return;
  if(!currentJobId){ setStatus("No active scan to cancel"); return; }
  try{
    const res = await fetch(API + "/cancel-scan/" + currentJobId, {method:"POST",headers:{"Authorization":"Bearer " + token}});
    const data = await res.json().catch(()=>({}));
    if(!res.ok){ setStatus(data.detail || "Could not cancel scan"); return; }
    if(progressTimer) clearInterval(progressTimer); progressTimer = null; currentJobId = null;
    $("out").innerHTML = `<div class="card HIGH"><h2>🛑 Scan Cancelled</h2><p>${esc(data.message || "Scan cancelled")}</p></div>`;
    setStatus("🛑 Scan cancelled");
  }catch(e){ setStatus("❌ Cannot connect to backend"); }
}

function pollScanStatus(jobId){
  const token = localStorage.getItem("token");
  progressTimer = setInterval(async () => {
    try{
      const res = await fetch(API + "/scan-status/" + jobId, {method:"GET",headers:{"Authorization":"Bearer " + token}});
      const job = await res.json().catch(()=>({}));
      if(!res.ok){ clearInterval(progressTimer); progressTimer=null; currentJobId=null; showError(job.detail || "Could not fetch scan status"); return; }
      updateQueueUI(job);
      if(job.status === "completed"){ clearInterval(progressTimer); progressTimer=null; currentJobId=null; setStatus("✅ Scan completed"); showResult(job.result); }
      if(job.status === "failed"){ clearInterval(progressTimer); progressTimer=null; currentJobId=null; showError(job.error || "Unknown error"); }
      if(job.status === "cancelled"){ clearInterval(progressTimer); progressTimer=null; currentJobId=null; $("out").innerHTML = `<div class="card HIGH"><h2>🛑 Scan Cancelled</h2><p>${esc(job.step || "Scan was cancelled")}</p></div>`; }
    }catch(e){ clearInterval(progressTimer); progressTimer=null; currentJobId=null; showError("Cannot connect to backend"); }
  }, 900);
}

function showError(msg){ $("out").innerHTML = `<div class="card HIGH"><h2>❌ Error</h2><p>${esc(msg)}</p></div>`; setStatus("❌ " + esc(msg)); }
function formatObject(obj){ if(!obj || typeof obj !== "object") return "Unknown"; const parts=[]; for(const key in obj){ if(obj[key]) parts.push(`${esc(key)}: ${esc(obj[key])}`); } return parts.length ? parts.join(", ") : "Unknown"; }
function safeList(arr, empty="None"){ return Array.isArray(arr) && arr.length ? arr.map(esc).join(", ") : empty; }

function showResult(data){
  if(!data){ showError("Empty scan result"); return; }
  lastReport = data;
  const vulns = data.vulnerability_checks || [], cveGroups = data.cve_results || [], niktoChecks = data.nikto_checks || [];
  const count = sev => vulns.filter(v => v.severity === sev).length;
  const cveCount = cveGroups.reduce((sum,g)=>sum + (g.cves ? g.cves.length : 0),0);
  const openPorts = data.open_ports?.length ? data.open_ports.map(p => typeof p === "object" ? `<div class="finding ${p.risk === "RISKY" ? "MEDIUM" : "INFO"}"><p><b>Port:</b> ${esc(p.port)}</p><p><b>Service:</b> ${esc(p.service || "Unknown")}</p><p><b>Risk:</b> ${esc(p.risk || "NORMAL")}</p><p><b>Banner:</b> ${esc(p.banner || "-")}</p></div>` : `<p>${esc(p)}</p>`).join("") : "<p>None</p>";
  const vulnerabilityChecks = vulns.length ? vulns.map(v => `<div class="finding ${esc(v.severity || 'UNKNOWN')}"><h4>🧨 ${esc(v.name)}</h4><p><b>Severity:</b> ${esc(v.severity)}</p><p><b>Evidence:</b> ${esc(v.evidence)}</p><p><b>Impact:</b> ${esc(v.impact)}</p><p><b>Fix:</b> ${esc(v.fix)}</p></div>`).join("") : "<p>✅ No confirmed vulnerability indicators detected</p>";
  const niktoResults = niktoChecks.length ? niktoChecks.map(n => `<div class="nikto ${esc(n.severity || 'INFO')}"><h4>🧪 ${esc(n.name)}</h4><p><b>Severity:</b> ${esc(n.severity)}</p><p><b>Path:</b> ${esc(n.path)}</p><p><b>Status:</b> ${esc(n.status)}</p><p><b>URL:</b> <a href="${esc(n.url)}" target="_blank">${esc(n.url)}</a></p><p><b>Evidence:</b> ${esc(n.evidence)}</p><p><b>Fix:</b> ${esc(n.fix)}</p></div>`).join("") : "<p>✅ No Nikto-like exposed paths detected</p>";
  const findings = data.findings?.length ? data.findings.map(f => `<div class="finding ${esc(f.severity || 'INFO')}"><h4>🕳️ ${esc(f.title)}</h4><p><b>Severity:</b> ${esc(f.severity)}</p><p><b>Description:</b> ${esc(f.description)}</p><p><b>Fix:</b> ${esc(f.fix)}</p></div>`).join("") : "<p>✅ No major findings detected</p>";
  const subdomains = data.subdomains?.length ? data.subdomains.map(s => `<div class="finding"><p><b>Subdomain:</b> ${esc(s.subdomain)}</p><p><b>IPs:</b> ${safeList(s.ips)}</p><p><b>HTTPS:</b> ${s.https ? "✅ Yes" : "❌ No"}</p><p><b>HTTP:</b> ${s.http ? "✅ Yes" : "❌ No"}</p><p><b>Status:</b> ${esc(s.status_code || "Unknown")}</p><p><b>Final URL:</b> ${esc(s.final_url || "N/A")}</p></div>`).join("") : "<p>No common subdomains found</p>";
  const cveResults = cveGroups.length ? cveGroups.map(group => `<div class="finding"><h4>🧩 Technology: ${esc(group.technology)}</h4>${group.cves && group.cves.length ? group.cves.map(cve => `<div class="cve ${esc(cve.severity || "UNKNOWN")}"><h4>🚨 ${esc(cve.id)}</h4><p><b>Severity:</b> ${esc(cve.severity || "UNKNOWN")}</p><p><b>CVSS Score:</b> ${esc(cve.score || "N/A")}</p><p><b>Published:</b> ${esc(cve.published || "Unknown")}</p><p><b>Description:</b> ${esc(cve.description || "No description")}</p><p><b>Reference:</b> <a href="${esc(cve.url)}" target="_blank">Open NVD Details</a></p></div>`).join("") : "<p>✅ No CVEs found for this technology</p>"}</div>`).join("") : "<p>No CVE results available</p>";
  const whoisAsn = data.whois_asn ? `<div class="finding INFO"><p><b>IP:</b> ${esc(data.whois_asn.ip || "Unknown")}</p><p><b>ASN:</b> ${esc(data.whois_asn.asn || "Unknown")}</p><p><b>Organization:</b> ${esc(data.whois_asn.organization || "Unknown")}</p><p><b>ISP:</b> ${esc(data.whois_asn.isp || "Unknown")}</p><p><b>Country:</b> ${esc(data.whois_asn.country || "Unknown")}</p><p><b>Region/City:</b> ${esc((data.whois_asn.region || "Unknown") + " / " + (data.whois_asn.city || "Unknown"))}</p><p><b>Reverse DNS:</b> ${esc(data.whois_asn.reverse_dns || "None")}</p><p><b>Network Range:</b> ${esc(data.whois_asn.network_range || "Unknown")}</p></div>` : "<p>No Whois / ASN data available</p>";
  $("out").innerHTML = `<div class="card ${esc(data.risk || 'UNKNOWN')}"><div class="section-title"><h2>🛡️ Scan Result</h2><span class="pill">${esc(data.profile || "full")}</span></div><div class="summary-grid"><div class="summary-box"><h3>Risk</h3><p>${esc(data.risk || 'UNKNOWN')}</p></div><div class="summary-box"><h3>Score</h3><p>${esc(data.score ?? 'N/A')}/100</p></div><div class="summary-box"><h3>Total Vulns</h3><p>${vulns.length}</p></div><div class="summary-box"><h3>Nikto</h3><p>${niktoChecks.length}</p></div><div class="summary-box"><h3>Critical</h3><p>${count('CRITICAL')}</p></div><div class="summary-box"><h3>High</h3><p>${count('HIGH')}</p></div><div class="summary-box"><h3>Medium</h3><p>${count('MEDIUM')}</p></div><div class="summary-box"><h3>Low</h3><p>${count('LOW')}</p></div><div class="summary-box"><h3>CVEs</h3><p>${cveCount}</p></div><div class="summary-box"><h3>Subdomains</h3><p>${data.subdomains?.length || 0}</p></div></div><h3>🌐 Target Information</h3><p><b>Target:</b> ${esc(data.target)}</p><p><b>Host:</b> ${esc(data.host)}</p><p><b>IP:</b> ${esc(data.ip)}</p><p><b>Final URL:</b> ${esc(data.final_url || "N/A")}</p><p><b>HTTP Status:</b> ${esc(data.status_code)}</p><hr><h3>🧨 Vulnerability Checks</h3>${vulnerabilityChecks}<hr><h3>🧪 Nikto-like Checks</h3>${niktoResults}<hr><h3>🔒 SSL / TLS</h3><p><b>SSL Valid:</b> ${data.ssl?.valid ? "✅ Yes" : "❌ No"}</p><p><b>SSL Expiration:</b> ${esc(data.ssl?.info || "Unknown")}</p><p><b>TLS Version:</b> ${esc(data.ssl?.tls_version || "Unknown")}</p><p><b>Cipher:</b> ${esc(data.ssl?.cipher_name || "Unknown")} / ${esc(data.ssl?.cipher_bits || "Unknown")} bits</p><p><b>Certificate Subject:</b> ${formatObject(data.ssl?.subject)}</p><p><b>Certificate Issuer:</b> ${formatObject(data.ssl?.issuer)}</p><hr><h3>🌐 DNS Security</h3><p><b>A Records:</b> ${safeList(data.dns_security?.a_records)}</p><p><b>MX Records:</b> ${safeList(data.dns_security?.mx_records)}</p><p><b>NS Records:</b> ${safeList(data.dns_security?.ns_records)}</p><p><b>SPF:</b> ${data.dns_security?.spf ? "✅ Found" : "❌ Missing"}</p><p><b>DMARC:</b> ${data.dns_security?.dmarc ? "✅ Found" : "❌ Missing"}</p><p><b>DNS Issues:</b> ${safeList(data.dns_security?.issues,"No DNS issues")}</p><hr><h3>🏢 Whois / ASN</h3>${whoisAsn}<hr><h3>🤖 Robots.txt</h3><p><b>Exists:</b> ${data.robots_txt?.exists ? "✅ Yes" : "❌ No"}</p><p><b>Summary:</b> ${esc(data.robots_txt?.summary || "Unknown")}</p><p><b>Suspicious Entries:</b> ${safeList(data.robots_txt?.suspicious_entries)}</p><hr><h3>🛡️ Security.txt</h3><p><b>Exists:</b> ${data.security_txt?.exists ? "✅ Yes" : "❌ No"}</p><p><b>URL:</b> ${esc(data.security_txt?.url || "N/A")}</p><p><b>Contacts:</b> ${safeList(data.security_txt?.contacts)}</p><p><b>Policy:</b> ${esc(data.security_txt?.policy || "None")}</p><hr><h3>🌍 Subdomains Discovered</h3>${subdomains}<hr><h3>🧠 Detected Technologies</h3><p>${safeList(data.technologies,"Unknown")}</p><hr><h3>🧬 CVE Results</h3>${cveResults}<hr><h3>🛡️ WAF Detection</h3><div class="finding INFO"><p><b>Name:</b> ${esc(data.waf?.name || data.waf || "Unknown")}</p><p><b>Confidence:</b> ${esc(data.waf?.confidence || "0%")}</p><p><b>Evidence:</b> ${safeList(data.waf?.evidence)}</p></div><hr><h3>🔁 HTTP Methods</h3><p>${safeList(data.http_methods,"Unknown")}</p><hr><h3>🚪 Open Ports</h3>${openPorts}<hr><h3>🧱 Security Headers</h3><p>✅ <b>Found:</b> ${safeList(data.security_headers?.found)}</p><p>❌ <b>Missing:</b> ${safeList(data.security_headers?.missing)}</p><hr><h3>📋 Findings & Fixes</h3>${findings}</div>`;
}

async function captureScreenshot(){
  const token = requireToken(), target = val("t"); if(!token) return; if(!target){ setStatus("❌ اكتب الموقع أولاً"); return; }
  $("out").innerHTML = `<div class="card INFO"><h2>📸 Capturing Screenshot...</h2><p><b>Target:</b> ${esc(target)}</p><p>Please wait...</p></div>`;
  try{
    const res = await fetch(API + "/screenshot", {method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer " + token},body:JSON.stringify({target})});
    const data = await res.json().catch(()=>({}));
    if(!res.ok){ showError(data.detail || "Could not capture screenshot"); return; }
    $("out").innerHTML = `<div class="card INFO"><h2>📸 Screenshot Result</h2><p><b>Target:</b> ${esc(data.target)}</p><p><b>Final URL:</b> ${esc(data.final_url || "Unknown")}</p><img class="screenshot-img" src="${esc(data.data_url)}" alt="Website Screenshot"><br><br><button class="btn" onclick="downloadScreenshot('${data.data_url}', '${esc(target)}')">Download Screenshot</button></div>`;
  }catch(e){ showError("Cannot connect to backend"); }
}
function downloadScreenshot(dataUrl, target){ const a=document.createElement("a"); const safeName=(target || "target").replace(/[^a-z0-9]/gi,"-").toLowerCase(); a.href=dataUrl; a.download=`screenshot-${safeName}.png`; a.click(); }
function downloadReport(){ if(!lastReport){ setStatus("❌ No report to download"); return; } const blob=new Blob([JSON.stringify(lastReport,null,2)],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`scan-report-${lastReport.host || "target"}.json`; a.click(); URL.revokeObjectURL(url); }
function downloadPDF(){ if(!lastReport){ setStatus("❌ No report to export"); return; } const win=window.open("","_blank"); win.document.write(`<html><head><title>Threat Scanner PDF Report</title><style>body{font-family:Arial;padding:30px;color:#111827}.box{border:1px solid #ccc;padding:15px;margin:12px 0;border-radius:8px}</style></head><body><h1>🛡️ Threat Scanner Report</h1><div class="box"><p><b>Target:</b> ${esc(lastReport.target)}</p><p><b>Host:</b> ${esc(lastReport.host)}</p><p><b>Profile:</b> ${esc(lastReport.profile || "full")}</p><p><b>Risk:</b> ${esc(lastReport.risk)}</p><p><b>Score:</b> ${esc(lastReport.score)}/100</p><p><b>Total Vulnerabilities:</b> ${lastReport.vulnerability_checks?.length || 0}</p><p><b>Nikto-like Checks:</b> ${lastReport.nikto_checks?.length || 0}</p><p><b>TLS Version:</b> ${esc(lastReport.ssl?.tls_version || "Unknown")}</p><p><b>Cipher:</b> ${esc(lastReport.ssl?.cipher_name || "Unknown")}</p><p><b>ASN:</b> ${esc(lastReport.whois_asn?.asn || "Unknown")}</p><p><b>Organization:</b> ${esc(lastReport.whois_asn?.organization || "Unknown")}</p><p><b>Country:</b> ${esc(lastReport.whois_asn?.country || "Unknown")}</p></div><script>window.print();<\/script></body></html>`); win.document.close(); }


async function loadHistory(){
  const token = requireToken(); 
  if(!token) return;

  $("out").innerHTML = `
    <div class="card INFO">
      <h2>📜 Loading History...</h2>
      <p>Please wait...</p>
    </div>
  `;

  try{
    const res = await fetch(API + "/history", {
      headers:{
        "Authorization":"Bearer " + token
      }
    });

    const data = await res.json().catch(()=>({}));

    if(!res.ok){
      showError(data.detail || "Could not load history");
      return;
    }

    const items = data.data || [];

    if(!items.length){
      $("out").innerHTML = `
        <div class="card INFO">
          <h2>📜 Scan History</h2>
          <p>No saved scans found.</p>
        </div>
      `;
      return;
    }

    $("out").innerHTML = `
      <div class="card INFO">
        <div class="section-title">
          <h2>📜 Scan History</h2>
          <span class="pill">${items.length} scans</span>
        </div>

        ${items.map(i => `
          <div class="history-row">
            <div>
              <b>${esc(i.target || "Unknown target")}</b><br>
              <span class="mini">
                Risk: ${esc(i.risk || "Unknown")} |
                Score: ${esc(i.score ?? "N/A")}/100 |
                Date: ${esc(i.created_at || "")}
              </span>
            </div>

            <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
              <span class="pill">${esc(i.risk || "INFO")}</span>
              <button class="btn secondary" onclick="viewHistoryReport(${i.id})">
                View
              </button>
              <button class="btn danger" onclick="deleteHistoryScan(${i.id})">
                Delete
              </button>
            </div>
          </div>
        `).join("")}
      </div>
    `;

  }catch(e){
    showError("Cannot connect to history endpoint");
  }
}


async function viewHistoryReport(id){
  const token = requireToken(); 
  if(!token) return;

  try{
    const res = await fetch(API + "/history/" + id, {
      headers:{
        "Authorization":"Bearer " + token
      }
    });

    const report = await res.json().catch(()=>({}));

    if(!res.ok){
      showError(report.detail || "Could not load report");
      return;
    }

    showResult(report);

  }catch(e){
    showError("Cannot load scan report");
  }
}


async function deleteHistoryScan(id){
  const token = requireToken(); 
  if(!token) return;

  if(!confirm("Delete this scan from history?")){
    return;
  }

  try{
    const res = await fetch(API + "/history/" + id, {
      method:"DELETE",
      headers:{
        "Authorization":"Bearer " + token
      }
    });

    const data = await res.json().catch(()=>({}));

    if(!res.ok){
      showError(data.detail || "Could not delete scan");
      return;
    }

    setStatus("✅ Scan deleted");
    loadHistory();

  }catch(e){
    showError("Cannot delete scan");
  }
}

function logout(){
{ if(progressTimer){ clearInterval(progressTimer); progressTimer=null; } localStorage.removeItem("token"); currentJobId=null; lastReport=null; updateAuthUI(); setStatus("👋 Logged out"); }
